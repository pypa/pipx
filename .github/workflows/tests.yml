name: 🧪 tests
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - "main"
  pull_request:
  schedule:
    - cron: "0 8 * * *"
concurrency:
  # a literal prefix, not ${{ github.workflow }}: when release.yml calls this as a reusable workflow, github.workflow
  # resolves to the caller ("Release"), which would collide with release.yml's own group and cancel the release run
  group: tests-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    name: 🧪 test ${{ matrix.py }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        py: ["3.15", "3.15t", "3.14", "3.13", "3.12", "3.11", "3.10"]
        include:
          - os: windows-2025
            py: "3.14"
          - os: macos-15
            py: "3.14"
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: 🐍 Setup Python ${{ matrix.py }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.py }}
          # 3.15 is still in beta; setup-python resolves stable releases for every other matrix entry
          allow-prereleases: true
      - name: 📦 Install tox
        run: uv tool install --python-preference only-managed --python 3.14 "tox>=4.45" --with tox-uv
      - name: Persistent .pipx_tests/package_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.pipx_tests/package_cache/${{ matrix.py }}
          key: pipx-tests-package-cache-${{ runner.os }}-${{ matrix.py }}
      - name: 🏗️ Setup test suite
        run: tox run -vv --notest --skip-missing-interpreters false -e ${{ matrix.py }}
      - name: 📦 Seed package cache
        run: tox exec -e ${{ matrix.py }} -- python scripts/update_package_cache.py testdata/tests_packages .pipx_tests/package_cache/
      - name: 🏃 Run test suite
        run: tox run --skip-pkg-install -e ${{ matrix.py }}
        timeout-minutes: 30
        env:
          PYTEST_ADDOPTS: "-vv --durations=20"
  type:
    name: 🔍 Type check
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: 📦 Install tox
        run: uv tool install --python-preference only-managed --python 3.14 "tox>=4.45" --with tox-uv
      - name: 🔍 Run ty
        run: tox run -e type
  man:
    name: 📖 Build man page
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: 📦 Install tox
        run: uv tool install --python-preference only-managed --python 3.14 "tox>=4.45" --with tox-uv
      - name: 📖 Build man page
        run: tox run -e man
      - name: Show man page
        run: man -l build/man/pipx.1
  zipapp:
    name: 📦 Build zipapp
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - name: 📦 Build zipapp
        run: |
          pip install shiv
          shiv -c pipx -o ./pipx.pyz .
          ./pipx.pyz --version
      - name: Test zipapp by installing black
        run: python ./pipx.pyz install black
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pipx.pyz
          path: pipx.pyz
          retention-days: 3
