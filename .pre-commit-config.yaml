repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-case-conflict
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--wrap", "120"]
        additional_dependencies:
          - mdformat-mkdocs
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-footnote
          - mdformat-config
          - mdformat-front-matters
        exclude: ^(docs/changelog\.md|testdata)
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.3
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: ["--fix", "--unsafe-fixes", "--show-fixes", "--exit-non-zero-on-fix"]
      - id: ruff-format
  # ty runs in the `type` tox environment via GitHub Actions, not here: pre-commit.ci cannot install its
  # heavier dependency set (e.g. GitPython) in its sandbox.
  # Configuration for codespell is in pyproject.toml
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        exclude: ^testdata
